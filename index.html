<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Chatsong Community Indie Playlist</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .item { border: 1px solid #ccc; padding: 20px; border-radius: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 450px; border: none; border-radius: 8px; margin-top: 10px; }
        .btn-listen { display: block; width: 100%; padding: 12px; margin-top: 15px; background: #1DB954; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .btn-listen:hover { background: #1aa34a; }
        h3 { margin-top: 0; }
        p { margin: 5px 0; color: #555; }
    </style>
</head>
<body>
    <h1>Chatsong Community Indie Playlist</h1>
    <div class="gallery" id="playlist-container"></div>

    <script>
        const url = 'https://api.sheety.co/11210433ea3a8197221e9f0e125840d4/chatsongCommunityPlaylist/formResponses1';

        function getEmbedUrl(link) {
            if (!link) return "";
            
            // SoundCloud
            if (link.includes("soundcloud.com")) {
                return "https://w.soundcloud.com/player/?url=" + encodeURIComponent(link) + "&show_artwork=true&visual=false";
            }
            
            // Spotify
            if (link.includes("open.spotify.com/playlist/")) {
                return link.replace("open.spotify.com/playlist/", "open.spotify.com/embed/playlist/");
            }
            
            // YouTube: Vangt watch?v= en youtu.be af
            if (link.includes("youtube.com") || link.includes("youtu.be")) {
                let videoId = "";
                if (link.includes("v=")) {
                    videoId = link.split("v=")[1].split("&")[0];
                } else if (link.includes("youtu.be/")) {
                    videoId = link.split("youtu.be/")[1].split("?")[0];
                }
                return "https://www.youtube.com/embed/" + videoId;
            }
            
            return link;
        }

        fetch(url)
        .then((response) => response.json())
        .then(json => {
            const container = document.getElementById('playlist-container');
            json.formResponses1.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                
                const embedUrl = getEmbedUrl(item.playlistUrl);
                
                div.innerHTML = `
                    <h3>${item.playlistName || 'Geen titel'}</h3>
                    <p><strong>Service:</strong> ${item.streamingService || 'Muziek'}</p>
                    <p><strong>Door:</strong> ${item.createdBy || 'Community'}</p>
                    <iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    <a href="${item.playlistUrl}" target="_blank" class="btn-listen">🎧 Open in App</a>
                `;
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>
