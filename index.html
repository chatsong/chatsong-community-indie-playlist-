<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Community Playlist Gallery</title>
    <style>
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .item { border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        iframe { width: 100%; height: 166px; border: none; }
    </style>
</head>
<body>
    <h1>Community Playlist Gallery</h1>
    <div class="gallery" id="playlist-container">
        <!-- Hier komen de playlists -->
    </div>

    <script>
        // https://docs.google.com/forms/d/e/1FAIpQLScAiZs_Sksh8sl0174tjc0roSfJ3SbpMm9vSrQT4s7sYdNbrA/viewform
        const playlists = [
            "https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/jouw-link",
            "https://www.youtube.com/embed/videoseries?list=PLA-jouw-playlist-id"
        ];

        const container = document.getElementById('playlist-container');
        playlists.forEach(url => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<iframe src="${url}"></iframe>`;
            container.appendChild(div);
        });
    </script>
</body>
</html>
