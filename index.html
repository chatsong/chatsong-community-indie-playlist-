<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Community Playlist Gallery</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .item { border: 1px solid #ccc; padding: 15px; border-radius: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 160px; border: none; border-radius: 4px; }
        .error { color: red; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>Community Playlist Gallery</h1>
    <div class="gallery" id="playlist-container"></div>

    <script>
        const url = 'https://api.sheety.co/11210433ea3a8197221e9f0e125840d4/chatsongCommunityPlaylist/formResponses1';

        function getEmbedCode(url) {
            if (!url) return null;
            
            // YouTube
            if (url.includes("youtube.com/watch?v=")) return url.replace("watch?v=", "embed/");
            if (url.includes("youtu.be/")) return url.replace("youtu.be/", "youtube.com/embed/");
            
            // SoundCloud
            if (url.includes("soundcloud.com")) return "https://w.soundcloud.com/player/?url=" + encodeURIComponent(url);
            
            // Spotify
            if (url.includes("open.spotify.com/")) return url.replace("open.spotify.com/", "open.spotify.com/embed/");
            
            return "invalid"; // Geeft aan dat we het niet kennen
        }

        fetch(url)
        .then((response) => response.json())
        .then(json => {
            const container = document.getElementById('playlist-container');
            json.formResponses1.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                
                const embedLink = getEmbedCode(item.playlistUrl);
                
                let content = "";
                if (embedLink === "invalid") {
                    content = `<p class="error">Deze link wordt helaas niet automatisch ondersteund. Controleer of het een geldige YouTube, Spotify of SoundCloud link is.</p>`;
                } else {
                    content = `<iframe src="${embedLink}" allow="encrypted-media"></iframe>`;
                }
                
                div.innerHTML = `
                    <h3>${item.playlistName || 'Playlist'}</h3>
                    ${content}
                    <p><strong>Service:</strong> ${item.streamingService || 'Muziek'}</p>
                    <p><strong>Door:</strong> ${item.createdBy || 'Community'}</p>
                `;
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>
