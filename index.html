<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Community Discovery Hub</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .item { border: 1px solid #ccc; padding: 15px; border-radius: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 160px; border: none; border-radius: 4px; margin-bottom: 10px; }
        .btn-listen { display: block; width: 100%; padding: 10px; background: #1DB954; color: white; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn-listen:hover { background: #1aa34a; }
    </style>
</head>
<body>
    <h1>Community Music Discovery Hub</h1>
    <p>Discover new tracks. Click "Open Playlist" to listen to the full list in your app.</p>
    <div class="gallery" id="playlist-container"></div>

    <script>
        const url = 'https://api.sheety.co/11210433ea3a8197221e9f0e125840d4/chatsongCommunityPlaylist/formResponses1';

        fetch(url)
        .then((response) => response.json())
        .then(json => {
            const container = document.getElementById('playlist-container');
            json.formResponses1.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                
                // Embed URL voor preview
                let embedUrl = item.playlistUrl;
                if (embedUrl.includes("youtube.com/watch?v=")) embedUrl = embedUrl.replace("watch?v=", "embed/");
                
                div.innerHTML = `
                    <h3>${item.playlistName || 'Playlist'}</h3>
                    <iframe src="${embedUrl}" allow="encrypted-media"></iframe>
                    <a href="${item.playlistUrl}" target="_blank" class="btn-listen">🎧 Open Full Playlist</a>
                    <p style="margin-top:10px; font-size:0.8em;"><strong>Service:</strong> ${item.streamingService || 'Muziek'}<br><strong>Door:</strong> ${item.createdBy || 'Community'}</p>
                `;
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>
