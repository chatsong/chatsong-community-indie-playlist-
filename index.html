<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Community Playlist Gallery</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .item { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #f9f9f9; }
        iframe { width: 100%; height: 200px; border: none; border-radius: 4px; }
        h3 { margin: 10px 0; }
        p { margin: 5px 0; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Community Playlist Gallery</h1>
    <div class="gallery" id="playlist-container"></div>

    <script>
        // Jouw unieke Sheety link
        const url = 'https://api.sheety.co/11210433ea3a8197221e9f0e125840d4/chatsongCommunityPlaylist/formResponses1';

        fetch(url)
        .then((response) => response.json())
        .then(json => {
            const container = document.getElementById('playlist-container');
            
            // Sheety zet je kolomnamen om in camelCase
            json.formResponses1.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                
                // Hier vullen we de data in
                div.innerHTML = `
                    <h3>${item.playlistName || 'Geen titel'}</h3>
                    <iframe src="${item.playlistUrl}"></iframe>
                    <p><strong>Service:</strong> ${item.streamingService || 'Niet ingevuld'}</p>
                    <p><strong>Door:</strong> ${item.createdBy || 'Anoniem'}</p>
                `;
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>
